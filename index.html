<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loading...</title>

    <link id="favicon" rel="icon">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <main class="player-card">

        <div class="live-badge">
            🔴 LIVE
        </div>

        <img id="stationLogo" class="station-logo" alt="Station Logo">

        <h1 id="stationName"></h1>

        <p id="stationSubtitle" class="subtitle"></p>

        <audio id="radioPlayer" preload="none">
            <source id="streamSource" src="" type="audio/mpeg">
        </audio>

        <div class="volume-section">
            <label for="volumeSlider">Volume</label>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >
        </div>

        <a
            id="discordButton"
            class="discord-btn"
            target="_blank"
            rel="noopener noreferrer"
        >
            Join Discord
        </a>

        <div id="status" class="status">
            Click Anywhere to Start Listening
        </div>

    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>

</body>
</html>
