<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Radio | Download</title>

    <link rel="stylesheet" href="css/downloads.css">
</head>
<body>

<div class="background"></div>

<div class="particles"></div>

<main class="container">

    <div class="card">

        <div class="icon">📻</div>

        <h1>Vantix Radio</h1>

        <p class="description">
            A lightweight standalone FiveM radio resource that allows
            players to listen to your custom radio station directly
            in-game.
        </p>

        <div class="stats">

            <div class="stat">
                <span>Version</span>
                <strong>v1.0.0</strong>
            </div>

            <div class="stat">
                <span>Framework</span>
                <strong>Standalone</strong>
            </div>

            <div class="stat">
                <span>License</span>
                <strong>Free</strong>
            </div>

        </div>

        <div class="features">

            <div>🎵 Custom Stream Support</div>
            <div>🔊 Volume Controls</div>
            <div>🚗 Vehicle Compatible</div>
            <div>⚡ Optimized Performance</div>

        </div>

        <div class="buttons">

            <button id="downloadBtn" class="download-btn">
                Download From GitHub
            </button>

            <button id="radioBtn" class="secondary-btn">
                Visit Radio
            </button>

        </div>

    </div>

</main>

<script src="js/downloads.js"></script>

</body>
</html>
