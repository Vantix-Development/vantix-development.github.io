<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logging in...</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;display:flex;align-items:center;justify-content:center;height:100vh;">
<div>Authenticating Discord...</div>

<script>
// ==========================
// DISCORD IMPLICIT FLOW FIX
// ==========================

// URL comes back like:
// #access_token=XXXX&token_type=Bearer&expires_in=...

const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);

const accessToken = params.get("access_token");

async function getUser() {

    if (!accessToken) {
        document.body.innerHTML = "Login failed (no token)";
        return;
    }

    try {

        const res = await fetch("https://discord.com/api/users/@me", {
            headers: {
                Authorization: `Bearer ${accessToken}`
            }
        });

        const user = await res.json();

        // store session
        localStorage.setItem("vantix_user", JSON.stringify({
            id: user.id,
            username: user.username,
            avatar: user.avatar
        }));

        // redirect
        window.location.href = "/admin-panel.html";

    } catch (err) {
        document.body.innerHTML = "Login failed";
        console.error(err);
    }
}

getUser();
</script>

</body>
</html>
