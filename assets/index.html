<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Hosting</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0f172a;
            font-family:Arial, sans-serif;
            color:#fff;
        }

        .box{
            text-align:center;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            max-width:500px;
        }

        h1{
            margin-bottom:10px;
            font-size:2rem;
        }

        p{
            color:#cbd5e1;
            line-height:1.5;
        }

        .tag{
            margin-top:15px;
            display:inline-block;
            padding:8px 14px;
            border-radius:999px;
            background:rgba(59,130,246,0.2);
            border:1px solid rgba(59,130,246,0.4);
            font-size:0.9rem;
        }
    </style>

</head>
<body>

    <div class="box">
        <h1>🖼 Image Hosting</h1>

        <p>
            This is a private image hosting area for the Vantix Development system.<br>
            Direct access is restricted.
        </p>

        <div class="tag">
            Access Controlled
        </div>
    </div>

</body>
</html>
