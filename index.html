<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vantix Radio</title>

    <link
        id="favicon"
        rel="icon"
        type="image/png"
        href="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
    >

    <link rel="stylesheet" href="style.css">

    <script>
        fetch("./status.json")
            .then(response => response.json())
            .then(data => {
                if (
                    data.mode === "maintenance" &&
                    !window.location.pathname.endsWith("maintenance.html")
                ) {
                    window.location.href = "maintenance.html";
                }
            })
            .catch(error => {
                console.error(
                    "Unable to load status.json",
                    error
                );
            });
    </script>
</head>

<body>

    <div class="background">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
</div>

    <div class="player-card">

        <div class="live-badge">
            <span class="live-dot"></span>
            LIVE 24/7
        </div>

        <img
            id="stationLogo"
            class="station-logo"
            src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
            alt="Vantix Radio Logo"
        >

        <h1 id="stationName">
            Vantix Radio
        </h1>

        <p
            id="stationSubtitle"
            class="subtitle"
        >
            The Official Radio Station of Andreas Initiative Roleplay
        </p>

        <!-- Radio Player -->
        <audio
            id="radioPlayer"
            controls
            preload="auto"
            crossorigin="anonymous"
        >
            Your browser does not support HTML5 audio.
        </audio>

        <div
            id="status"
            class="status"
        >
            Ready to Play
        </div>

        <div class="volume-section">

            <label for="volumeSlider">
                Volume
                <span id="volumeValue">
                    100%
                </span>
            </label>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

        </div>

        <a
            id="discordButton"
            class="discord-btn"
            href="https://radio.vantixurbex.shop/discord"
            target="_blank"
            rel="noopener noreferrer"
        >
            Join Discord
        </a>

    </div>

    <!-- Player Logic -->
    <script src="player.js"></script>

</body>
</html>
