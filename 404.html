<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>404 | Vantix Radio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top,#0ea5e9,#020617);
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    z-index:2;
}

.error{
    font-size:9rem;
    font-weight:900;
    animation:glow 2s infinite alternate;
}

.message{
    font-size:1.3rem;
    margin:15px 0;
    opacity:.9;
}

.home-btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 32px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    background:#0ea5e9;
    transition:.3s;
}

.home-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #0ea5e9;
}

.radio-wave{
    position:absolute;
    border:2px solid rgba(255,255,255,.15);
    border-radius:50%;
    animation:pulse 4s linear infinite;
}

.radio-wave:nth-child(1){
    width:300px;
    height:300px;
}

.radio-wave:nth-child(2){
    width:500px;
    height:500px;
    animation-delay:1s;
}

.radio-wave:nth-child(3){
    width:700px;
    height:700px;
    animation-delay:2s;
}

@keyframes pulse{
    0%{
        transform:scale(.8);
        opacity:1;
    }
    100%{
        transform:scale(1.3);
        opacity:0;
    }
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #38bdf8;
    }
    to{
        text-shadow:
            0 0 20px #38bdf8,
            0 0 40px #38bdf8,
            0 0 60px #38bdf8;
    }
}
</style>
</head>
<body>

<div class="radio-wave"></div>
<div class="radio-wave"></div>
<div class="radio-wave"></div>

<div class="container">
    <div class="error">404</div>

    <h2>📻 Signal Lost</h2>

    <p class="message">
        The page you're looking for isn't broadcasting right now.
    </p>

    <a href="/" class="home-btn">
        Return to Vantix Radio
    </a>
</div>

</body>
</html>
