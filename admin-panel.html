<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vantix Radio Admin Panel</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
}

/* BACKGROUND GLOW */
.background{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
}

.background::before,
.background::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
}

.background::before{
    width:500px;
    height:500px;
    background:#0ea5e9;
    top:-100px;
    left:-100px;
    animation:float 18s infinite ease-in-out;
}

.background::after{
    width:450px;
    height:450px;
    background:#f97316;
    bottom:-100px;
    right:-100px;
    animation:float 22s infinite ease-in-out reverse;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:3rem;
}

.header p{
    color:#94a3b8;
    margin-top:8px;
}

.panel{
    background:rgba(15,23,42,.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:30px;
    box-shadow:0 15px 50px rgba(0,0,0,.35);
}

.status-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px;
    border-radius:16px;
    background:rgba(255,255,255,.04);
    margin-bottom:25px;
}

.status-indicator{
    display:flex;
    align-items:center;
    gap:10px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#22c55e;
    animation:pulse 1.5s infinite;
}

.mode{
    font-weight:700;
    font-size:1.1rem;
}

.controls{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

button{
    border:none;
    border-radius:16px;
    padding:18px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-3px);
}

.live{
    background:linear-gradient(135deg,#16a34a,#22c55e);
    color:white;
}

.maintenance{
    background:linear-gradient(135deg,#ea580c,#fb923c);
    color:white;
}

.logout{
    background:linear-gradient(135deg,#dc2626,#ef4444);
    color:white;
}

.loading{
    text-align:center;
    margin-top:120px;
    font-size:1.2rem;
    color:white;
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    text-align:center;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(100px);}
}

</style>

</head>

<body>

<div class="background"></div>

<div id="loading" class="loading">
    Verifying Discord Access...
</div>

<div class="container" id="adminPanel" style="display:none;">

    <div class="header">
        <h1>🎙️ Vantix Radio</h1>
        <p>Administration Dashboard</p>
    </div>

    <div class="panel">

        <div class="status-card">
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="mode">
                    Current Mode:
                    <span id="currentMode">LIVE</span>
                </span>
            </div>
        </div>

        <div class="controls">

            <button class="live" onclick="setMode('live')">
                🟢 Set Site Live
            </button>

            <button class="maintenance" onclick="setMode('maintenance')">
                🟠 Enable Maintenance
            </button>

            <button class="logout" onclick="logout()">
                🔴 Logout
            </button>

        </div>

        <div class="footer">
            Vantix Radio Administration Panel
        </div>

    </div>

</div>

<script>

/* =========================
   AUTH CHECK (DISCORD OAUTH)
========================= */

window.addEventListener("load", () => {

    const user =
        JSON.parse(localStorage.getItem("vantix_user"));

    if (!user || !user.id) {
        location.href = "login.html";
        return;
    }

    const ALLOWED_USERS = [
        "YOUR_DISCORD_ID"
    ];

    if (!ALLOWED_USERS.includes(user.id)) {

        alert("Access Denied");

        localStorage.removeItem("vantix_user");

        location.href = "login.html";

        return;
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    const mode =
        localStorage.getItem("vantix_site_mode") || "live";

    updateModeDisplay(mode);
});

/* =========================
   UI MODE SYSTEM
========================= */

function updateModeDisplay(mode){
    document.getElementById("currentMode").textContent =
        mode.toUpperCase();
}

function setMode(mode){

    localStorage.setItem("vantix_site_mode", mode);

    updateModeDisplay(mode);

    alert("Site mode changed to " + mode.toUpperCase());
}

/* =========================
   LOGOUT
========================= */

function logout(){

    localStorage.removeItem("vantix_user");

    location.href = "login.html";
}

</script>

</body>
</html>
