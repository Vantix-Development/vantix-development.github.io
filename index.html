<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Radio</title>

    <link
        rel="icon"
        type="image/png"
        href="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
    >

    <link rel="stylesheet" href="style.css">
</head> <body> <script> fetch("./status.json") .then(response => response.json()) .then(data => { if ( data.mode === "maintenance" && !window.location.pathname.endsWith("maintenance.html") ) { window.location.href = "maintenance.html"; } }) .catch(error => { console.error( "Unable to load status.json", error ); }); </script>

    <div class="background"></div>

    <div class="player-card">

        <div class="live-badge">
            <span class="live-dot"></span>
            LIVE 24/7
        </div>

        <img
            class="station-logo"
            src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
            alt="Vantix Radio Logo"
        >

        <h1>Vantix Radio</h1>

        <p class="subtitle">
            The Official Radio Station of Andreas Initiative Roleplay
        </p>

        <!-- Stream Player -->
<audio
    id="radioPlayer"
    controls
    preload="metadata"
    crossorigin="anonymous">
    <source
        id="streamSource"
        src="https://eu8.fastcast4u.com/proxy/vantixradio/stream"
        type="audio/mpeg">
</audio>

        <div id="status" class="status">
            Ready to Play
        </div>

        <div class="volume-section">

            <label for="volumeSlider">
                Volume
                <span id="volumeValue">100%</span>
            </label>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

        </div>

        <a
            class="discord-btn"
            href="http://radio.vantixurbex.shop/discord"
            target="_blank"
            rel="noopener noreferrer"
        >
            Join Discord
        </a>

    </div>

    <script>
        const player = document.getElementById("radioPlayer");
        const volumeSlider = document.getElementById("volumeSlider");
        const status = document.getElementById("status");

        player.volume = 1;

        volumeSlider.addEventListener("input", () => {
            player.volume = volumeSlider.value;
        });

        player.addEventListener("play", () => {
            status.textContent = "🔴 Live Now Playing";
        });

        player.addEventListener("pause", () => {
            status.textContent = "Paused";
        });

        player.addEventListener("error", () => {
            status.textContent = "Stream Offline";
        });

        player.addEventListener("waiting", () => {
            status.textContent = "Buffering...";
        });
    </script>

</body>
</html>
