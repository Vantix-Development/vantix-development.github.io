<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Radio Admin Panel</title>

    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_cGxlYXNhbnQtbW9uaXRvci03My5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>

    <style>
        body{
            font-family:Segoe UI,Arial,sans-serif;
            background:#0f172a;
            color:white;
            padding:40px;
        }

        .card{
            max-width:600px;
            margin:auto;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            display:none;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        }

        .live{
            background:#16a34a;
            color:white;
        }

        .maintenance{
            background:#ea580c;
            color:white;
        }

        .logout{
            background:#dc2626;
            color:white;
        }

        .loading{
            text-align:center;
            margin-top:100px;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    Verifying access...
</div>

<div class="card" id="adminPanel">

    <h1>Vantix Radio Admin</h1>

    <button
        class="live"
        onclick="setMode('live')">
        Set Site Live
    </button>

    <button
        class="maintenance"
        onclick="setMode('maintenance')">
        Set Maintenance Mode
    </button>

    <button
        class="logout"
        onclick="logout()">
        Logout
    </button>

</div>

<script>
window.addEventListener("load", async () => {

    await Clerk.load();

    if (!Clerk.user) {
        location.href = "login.html";
        return;
    }

    const ALLOWED_USERS = [
        "YOUR_DISCORD_USER_ID"
    ];

    const discordAccount =
        Clerk.user.externalAccounts?.find(
            account =>
                account.provider === "oauth_discord"
        );

    const discordId =
        discordAccount?.providerUserId;

    if (!ALLOWED_USERS.includes(discordId)) {

        alert("Access Denied");

        await Clerk.signOut();

        location.href = "login.html";

        return;
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
});

function setMode(mode){

    localStorage.setItem(
        "vantix_site_mode",
        mode
    );

    alert(
        "Mode changed to: " + mode
    );
}

async function logout(){

    await Clerk.signOut();

    location.href = "login.html";
}
</script>

</body>
</html>
