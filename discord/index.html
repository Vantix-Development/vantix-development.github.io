<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Redirect delay (optional fallback safe) -->
    <meta http-equiv="refresh" content="12; url=https://discord.com/invite/YaaEnHTSvk">

    <title>Redirecting to Discord | Vantix Radio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;

            background:
                radial-gradient(circle at top, #5865F2, #0f172a 60%);

            color:white;
            text-align:center;
        }

        .card{
            width:min(520px, 92%);
            padding:40px;

            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12);

            backdrop-filter:blur(20px);

            border-radius:20px;

            box-shadow:0 0 60px rgba(88,101,242,0.25);

            animation: float 3s ease-in-out infinite;
        }

        /* 🎧 DISCORD LOGO PULSE */
        .logo{
            width:80px;
            height:80px;
            margin-bottom:20px;

            animation: pulse 1.8s infinite;
            filter: drop-shadow(0 0 15px rgba(88,101,242,0.8));
        }

        h1{
            font-size:1.8rem;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
            line-height:1.5;
        }

        /* 🟣 GLowing JOIN BUTTON */
        .discord{
            display:inline-block;
            padding:14px 20px;

            background:#5865F2;
            color:white;

            border-radius:12px;
            text-decoration:none;

            font-weight:700;

            transition:0.2s ease;

            box-shadow:0 0 0 rgba(88,101,242,0.0);
            animation: glow 2.5s infinite;
        }

        .discord:hover{
            transform:translateY(-3px);
            background:#4752c4;
            box-shadow:0 0 25px rgba(88,101,242,0.6);
        }

        .small{
            margin-top:15px;
            font-size:0.85rem;
            color:#94a3b8;
        }

        /* FLOAT ANIMATION */
        @keyframes float{
            0%,100%{ transform:translateY(0); }
            50%{ transform:translateY(-6px); }
        }

        /* 🎧 PULSE */
        @keyframes pulse{
            0%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.08);
            }
            100%{
                transform:scale(1);
            }
        }

        /* 🟣 GLOW EFFECT */
        @keyframes glow{
            0%{
                box-shadow:0 0 5px rgba(88,101,242,0.3);
            }
            50%{
                box-shadow:0 0 25px rgba(88,101,242,0.7);
            }
            100%{
                box-shadow:0 0 5px rgba(88,101,242,0.3);
            }
        }

    </style>

    <script>
        window.location.replace(
            "https://discord.com/invite/YaaEnHTSvk"
        );
    </script>

</head>

<body>

    <div class="card">

        <!-- 🎧 Animated Discord logo -->
        <img class="logo"
             src="https://radio.vantixurbex.shop/assets/discord.png"
             alt="Discord Logo">

        <h1>Joining Discord</h1>

        <p>
            You are being redirected to the <b>Vantix Radio Discord</b> community.
        </p>

        <!-- 🟣 glowing button -->
        <a class="discord"
           href="https://discord.com/invite/YaaEnHTSvk">
           🟣 Join Community
        </a>

        <div class="small">
            If you are not redirected automatically, click the button above.
        </div>

    </div>

</body>
</html>
