<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Radio</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <main class="player-card">

        <div class="live-badge">
            🔴 LIVE
        </div>

        <h1>Vantix Radio</h1>

        <p class="subtitle">
            The Official Radio Station of Andreas Initiative Roleplay
        </p>

        <button id="playBtn" type="button">
            ▶ Play Radio
        </button>

        <audio id="radioPlayer" preload="none">
            <source src="http://51.255.235.165:2128/stream.mp3" type="audio/mpeg">
            Your browser does not support HTML5 audio.
        </audio>

        <div class="volume-section">
            <label for="volumeSlider">Volume</label>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >
        </div>

        <a
            class="discord-btn"
            href="https://discord.com/invite/YaaEnHTSvk"
            target="_blank"
            rel="noopener noreferrer"
        >
            Join Discord
        </a>

        <div id="status" class="status">
            Ready to Play
        </div>

    </main>

    <script>
        const player = document.getElementById('radioPlayer');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const status = document.getElementById('status');

        player.volume = 1;

        playBtn.addEventListener('click', async () => {
            try {
                if (player.paused) {
                    await player.play();
                    playBtn.textContent = '⏸ Pause Radio';
                    status.textContent = 'Connected';
                } else {
                    player.pause();
                    playBtn.textContent = '▶ Play Radio';
                    status.textContent = 'Paused';
                }
            } catch (error) {
                console.error(error);
                status.textContent = 'Stream Unavailable';
            }
        });

        volumeSlider.addEventListener('input', () => {
            player.volume = volumeSlider.value;
        });

        player.addEventListener('error', () => {
            status.textContent = 'Unable to Load Stream';
        });

        player.addEventListener('playing', () => {
            status.textContent = 'Live';
        });

        player.addEventListener('pause', () => {
            if (!player.ended) {
                status.textContent = 'Paused';
            }
        });
    </script>

</body>
</html>
